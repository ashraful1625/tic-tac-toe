<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tic Tac Toe — Robot · Friend · Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --bg-1:#150a22;
    --bg-2:#241138;
    --bg-3:#33154a;
    --panel:rgba(255,255,255,0.045);
    --panel-border:rgba(255,255,255,0.10);
    --ink:#f3eefc;
    --ink-dim:#b9aed0;
    --accent:#ffb454;
    --accent-dim:#caa164;
    --x-color:#ff5d8f;
    --o-color:#46e0c4;
    --danger:#ff5d5d;
    --radius:18px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    min-height:100%;
    scrollbar-gutter:stable;
    overflow-x:hidden;
  }

  body{
    font-family:'Sora', system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,180,84,0.10), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(70,224,196,0.10), transparent 45%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 14px;
  }

  .stage{
    width:min(94vw, 460px);
    position:relative;
  }

  .panel{
    background:var(--panel);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    padding:clamp(20px, 5vw, 34px);
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }

  .screen{ display:none; }
  .screen.active{ display:block; animation:fadeIn .35s ease; }

  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .marquee{
    display:flex;
    justify-content:center;
    gap:7px;
    margin-bottom:14px;
  }
  .marquee span{
    width:7px; height:7px; border-radius:50%;
    background:var(--accent);
    opacity:.25;
    animation:bulb 2.4s ease-in-out infinite;
  }
  .marquee span:nth-child(odd){ background:var(--x-color); }
  .marquee span:nth-child(even){ background:var(--o-color); }
  .marquee span:nth-child(1){ animation-delay:0s; }
  .marquee span:nth-child(2){ animation-delay:.2s; }
  .marquee span:nth-child(3){ animation-delay:.4s; }
  .marquee span:nth-child(4){ animation-delay:.6s; }
  .marquee span:nth-child(5){ animation-delay:.8s; }
  .marquee span:nth-child(6){ animation-delay:1s; }
  .marquee span:nth-child(7){ animation-delay:1.2s; }
  @keyframes bulb{ 0%,100%{opacity:.2;} 50%{opacity:1;} }

  h1.title{
    text-align:center;
    font-size:clamp(1.5rem, 6vw, 2.1rem);
    font-weight:800;
    letter-spacing:1px;
    color:var(--ink);
    margin-bottom:4px;
  }
  h1.title em{
    font-style:normal;
    background:linear-gradient(90deg, var(--x-color), var(--accent), var(--o-color));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle{
    text-align:center;
    color:var(--ink-dim);
    font-size:clamp(0.75rem, 2.6vw, 0.9rem);
    margin-bottom:26px;
  }

  .mode-list{ display:flex; flex-direction:column; gap:12px; }

  .mode-card{
    width:100%;
    text-align:left;
    display:flex;
    align-items:center;
    gap:14px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:14px 16px;
    color:var(--ink);
    font-family:inherit;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .mode-card:hover, .mode-card:focus-visible{
    transform:translateY(-2px);
    border-color:var(--accent-dim);
    background:rgba(255,255,255,0.06);
    outline:none;
  }
  .mode-icon{
    width:44px; height:44px; min-width:44px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem;
  }
  .mode-card.robot .mode-icon{ background:rgba(255,93,143,0.16); }
  .mode-card.friend .mode-icon{ background:rgba(255,180,84,0.16); }
  .mode-card.online .mode-icon{ background:rgba(70,224,196,0.16); }

  .mode-text strong{ display:block; font-size:0.95rem; font-weight:700; }
  .mode-text span{ display:block; font-size:0.72rem; color:var(--ink-dim); margin-top:2px; }

  .btn{
    font-family:inherit;
    font-weight:700;
    font-size:0.85rem;
    letter-spacing:.3px;
    padding:13px 20px;
    border-radius:12px;
    border:2px solid var(--accent);
    background:transparent;
    color:var(--accent);
    cursor:pointer;
    transition:transform .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .btn:hover{ background:var(--accent); color:#1a0f06; transform:translateY(-2px); box-shadow:0 10px 22px rgba(255,180,84,0.25); }
  .btn:active{ transform:translateY(0); }
  .btn.ghost{ border-color:var(--panel-border); color:var(--ink-dim); }
  .btn.ghost:hover{ background:rgba(255,255,255,0.08); color:var(--ink); box-shadow:none; }
  .btn.wide{ width:100%; }
  .btn.small{ padding:9px 14px; font-size:0.72rem; }
  .btn[disabled]{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }

  .row{ display:flex; gap:10px; }
  .row.center{ justify-content:center; }
  .row.wrap{ flex-wrap:wrap; }

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--ink-dim);
    font-size:0.75rem;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    margin-bottom:18px;
    padding:4px 0;
  }
  .back-link:hover{ color:var(--ink); }

  .choice-grid{ display:flex; flex-direction:column; gap:10px; }
  .choice-card{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:14px 16px;
    cursor:pointer;
    color:var(--ink);
    font-family:inherit;
    text-align:left;
    transition:border-color .18s ease, background .18s ease;
  }
  .choice-card:hover{ border-color:var(--accent-dim); background:rgba(255,255,255,0.06); }
  .choice-card strong{ display:block; font-size:0.9rem; }
  .choice-card span{ font-size:0.72rem; color:var(--ink-dim); }

  .field-label{ font-size:0.72rem; color:var(--ink-dim); margin-bottom:6px; display:block; }

  input.code-input{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:1.3rem;
    letter-spacing:4px;
    text-align:center;
    text-transform:uppercase;
    padding:14px;
    border-radius:12px;
    border:2px solid var(--panel-border);
    background:rgba(0,0,0,0.25);
    color:var(--ink);
    margin-bottom:14px;
  }
  input.code-input:focus{ outline:none; border-color:var(--accent-dim); }

  .room-code-display{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(1.8rem, 9vw, 2.4rem);
    letter-spacing:6px;
    color:var(--accent);
    text-shadow:0 0 18px rgba(255,180,84,0.45);
    margin:18px 0;
  }

  .hint-msg{
    text-align:center;
    font-size:0.78rem;
    color:var(--ink-dim);
    min-height:1.2em;
    margin:8px 0 4px;
  }
  .hint-msg.error{ color:var(--danger); }
  .hint-msg.success{ color:var(--o-color); }

  .spinner{
    width:26px; height:26px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.15);
    border-top-color:var(--accent);
    margin:0 auto 16px;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .game-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:6px;
  }
  .mode-badge{
    font-size:0.68rem;
    color:var(--ink-dim);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:5px 12px;
  }

  .game-board{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin:20px 0 14px;
  }

  .cell{
    aspect-ratio:1;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--panel-border);
    border-radius:12px;
    font-size:clamp(1.8rem, 8vw, 2.4rem);
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all .12s ease;
    color:var(--ink-dim);
  }
  .cell:hover:not(.filled){ border-color:var(--accent-dim); }
  .cell.filled{ cursor:default; }
  .cell.x{ color:var(--x-color); }
  .cell.o{ color:var(--o-color); }
  .cell.winning{ background:rgba(70,224,196,0.15); }

  .score-row{
    display:flex;
    justify-content:space-around;
    gap:10px;
    margin-bottom:16px;
  }

  .score-box{
    flex:1;
    text-align:center;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:12px 8px;
  }

  .score-label{
    font-size:0.68rem;
    color:var(--ink-dim);
    text-transform:uppercase;
    letter-spacing:.8px;
  }

  .score-value{
    font-size:1.8rem;
    font-weight:700;
    margin-top:4px;
  }

  .score-box.x .score-value{ color:var(--x-color); }
  .score-box.o .score-value{ color:var(--o-color); }
  .score-box.tie .score-value{ color:var(--accent); }

  .status-line{
    text-align:center;
    font-size:0.9rem;
    color:var(--ink-dim);
    margin:10px 0 14px;
    min-height:1.3em;
  }

  .footer-note{
    text-align:center;
    font-size:0.7rem;
    color:var(--ink-dim);
    margin-top:12px;
    min-height:1.1em;
  }

  .confetti{
    position:fixed;
    pointer-events:none;
    width:8px;
    height:8px;
    animation:confetti-fall linear forwards;
  }

  @keyframes confetti-fall{
    to{
      transform:translateY(100vh) rotateZ(720deg);
      opacity:0;
    }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Home Screen -->
  <div id="homeScreen" class="screen active">
    <div class="panel">
      <div class="marquee">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <h1 class="title">Tic <em>Tac</em> Toe</h1>
      <p class="subtitle">Play anywhere, anytime</p>
      
      <div class="mode-list">
        <button class="mode-card robot" onclick="startRobotMode()">
          <div class="mode-icon">🤖</div>
          <div class="mode-text">
            <strong>Robot</strong>
            <span>Challenge the AI</span>
          </div>
        </button>
        <button class="mode-card friend" onclick="showScreen('friendSetup')">
          <div class="mode-icon">👥</div>
          <div class="mode-text">
            <strong>Friend</strong>
            <span>Local multiplayer</span>
          </div>
        </button>
        <button class="mode-card online" onclick="showScreen('onlineSetup')">
          <div class="mode-icon">🌐</div>
          <div class="mode-text">
            <strong>Online</strong>
            <span>Play with friends remotely</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Online Setup -->
  <div id="onlineSetup" class="screen">
    <div class="panel">
      <button class="back-link" onclick="goHome()">← Back</button>
      
      <h1 class="title">Play <em>Online</em></h1>
      <p class="subtitle">Real-time multiplayer</p>

      <div class="choice-grid">
        <button class="choice-card" onclick="createRoom()">
          <strong>Create Room</strong>
          <span>Share code with your friend</span>
        </button>
        <button class="choice-card" onclick="showScreen('joinRoom')">
          <strong>Join Room</strong>
          <span>Enter room code from your friend</span>
        </button>
      </div>

      <div id="onlineSetupMsg" class="hint-msg"></div>
    </div>
  </div>

  <!-- Join Room Screen -->
  <div id="joinRoom" class="screen">
    <div class="panel">
      <button class="back-link" onclick="showScreen('onlineSetup')">← Back</button>
      
      <h1 class="title">Join <em>Room</em></h1>
      <p class="subtitle">Enter the 4-letter code</p>

      <label class="field-label">Room Code</label>
      <input id="joinCodeInput" class="code-input" placeholder="XXXX" maxlength="4">
      
      <button class="btn wide" onclick="joinRoom()">Join</button>
      <div id="joinRoomMsg" class="hint-msg"></div>
    </div>
  </div>

  <!-- Waiting for Opponent -->
  <div id="onlineWaiting" class="screen">
    <div class="panel">
      <button class="back-link" onclick="goHome()">← Back</button>
      
      <h1 class="title">Room <em>Ready</em></h1>
      <p class="subtitle">Share this code</p>

      <div class="room-code-display" id="waitingRoomCode">----</div>

      <p style="text-align:center; font-size:0.85rem; color:var(--ink-dim); margin-bottom:20px;">
        Share this code with your friend to start playing
      </p>

      <div class="spinner"></div>
      <p id="waitingMsg" class="hint-msg" style="margin:0;">Waiting for your friend…</p>
    </div>
  </div>

  <!-- Friend Setup -->
  <div id="friendSetup" class="screen">
    <div class="panel">
      <button class="back-link" onclick="goHome()">← Back</button>
      
      <h1 class="title">Local <em>Play</em></h1>
      <p class="subtitle">Choose difficulty</p>

      <div class="choice-grid">
        <button class="choice-card" onclick="startFriendMode('easy')">
          <strong>Easy</strong>
          <span>Friendly competition</span>
        </button>
        <button class="choice-card" onclick="startFriendMode('hard')">
          <strong>Hard</strong>
          <span>Both players are sharp</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="screen">
    <div class="panel">
      <div class="game-header">
        <button class="back-link" onclick="goHome()">← Back</button>
        <div class="mode-badge" id="modeBadge">Robot</div>
      </div>

      <div class="score-row">
        <div class="score-box x">
          <div class="score-label">X</div>
          <div class="score-value" id="scoreX">0</div>
        </div>
        <div class="score-box tie">
          <div class="score-label">Tie</div>
          <div class="score-value" id="scoreTie">0</div>
        </div>
        <div class="score-box o">
          <div class="score-label">O</div>
          <div class="score-value" id="scoreO">0</div>
        </div>
      </div>

      <div class="game-board" id="gameBoard"></div>

      <div class="status-line" id="statusLine">X's turn</div>

      <div class="row center">
        <button class="btn small" onclick="resetScores()">Reset Scores</button>
      </div>

      <div id="footerNote" class="footer-note"></div>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebaseapp/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebaseapp/9.23.0/firebase-database.js"></script>

<script>
/* ============================================================
   FIREBASE CONFIG — REPLACE WITH YOUR CREDENTIALS
============================================================ */

// ⚠️ IMPORTANT: Go to https://console.firebase.google.com
// 1. Create project
// 2. Create Realtime Database
// 3. Go to Settings → Your apps → Web
// 4. Copy your config below:

const firebaseConfig = {
  apiKey: "AIzaSyCh-f37b_I4suAA3gJ1tT-G4BSoa1siSDQ",
  authDomain: "tic-tac-toe-e0519.firebaseapp.com",
  databaseURL: "https://tic-tac-toe-e0519-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tic-tac-toe-e0519",
  storageBucket: "tic-tac-toe-e0519.firebasestorage.app",
  messagingSenderId: "30638568343",
  appId: "1:30638568343:web:4bfb5771c452a9cabc0ad2",
  measurementId: "G-3H00LWGVST"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ============================================================
   GAME STATE
============================================================ */
let mode = null;
let board = Array(9).fill(null);
let currentPlayer = 'X';
let gameActive = true;
let scores = { X: 0, O: 0, tie: 0 };

// Online mode
let roomCode = null;
let myRole = null;
let moveSeq = 0;
let firebaseListener = null;
let firebaseGameRef = null;

/* ============================================================
   DOM & REFS
============================================================ */
const gameBoard = document.getElementById('gameBoard');
const statusLine = document.getElementById('statusLine');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');
const scoreTieEl = document.getElementById('scoreTie');
const footerNote = document.getElementById('footerNote');

/* ============================================================
   SCREEN NAVIGATION
============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  if (firebaseListener) firebaseListener();
  if (firebaseGameRef) firebaseGameRef.off();
  gameActive = false;
  board = Array(9).fill(null);
  currentPlayer = 'X';
  roomCode = null;
  myRole = null;
  moveSeq = 0;
  showScreen('homeScreen');
}

/* ============================================================
   GAME LOGIC
============================================================ */
const WINNING = [
  [0,1,2], [3,4,5], [6,7,8],
  [0,3,6], [1,4,7], [2,5,8],
  [0,4,8], [2,4,6]
];

function checkWin(player) {
  for (let combo of WINNING) {
    if (combo.every(i => board[i] === player)) return combo;
  }
  return null;
}

function render() {
  gameBoard.innerHTML = '';
  const win = checkWin('X') || checkWin('O');
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (board[i]) cell.classList.add('filled', board[i].toLowerCase());
    if (win && win.includes(i)) cell.classList.add('winning');
    cell.textContent = board[i] || '';
    cell.onclick = () => playMove(i);
    gameBoard.appendChild(cell);
  }
}

function playMove(index) {
  if (!gameActive || board[index] !== null) return;
  
  if (mode === 'online' && currentPlayer !== myRole) {
    footerNote.textContent = 'Waiting for opponent…';
    return;
  }

  board[index] = currentPlayer;

  if (checkWin(currentPlayer)) {
    gameActive = false;
    if (currentPlayer === 'X') scores.X++;
    else scores.O++;
    updateScores();
    statusLine.textContent = `${currentPlayer} wins!`;
    if (mode === 'online') pushGameState();
    render();
    scheduleAutoRestart();
  } else if (board.every(c => c !== null)) {
    gameActive = false;
    scores.tie++;
    updateScores();
    statusLine.textContent = "It's a tie!";
    if (mode === 'online') pushGameState();
    render();
    scheduleAutoRestart();
  } else {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    if (mode === 'online') pushGameState();
    else if (mode === 'robot') {
      setTimeout(robotMove, 600);
    }
    updateStatus();
    render();
  }
}

function updateStatus() {
  if (mode === 'online') {
    statusLine.textContent = currentPlayer === myRole ? 'Your turn' : 'Opponent\'s turn';
  } else {
    statusLine.textContent = `${currentPlayer}'s turn`;
  }
}

function updateScores() {
  scoreXEl.textContent = scores.X;
  scoreOEl.textContent = scores.O;
  scoreTieEl.textContent = scores.tie;
}

function resetScores() {
  if (confirm('Reset all scores?')) {
    scores = { X: 0, O: 0, tie: 0 };
    updateScores();
  }
}

function scheduleAutoRestart() {
  setTimeout(() => {
    if (mode === 'online') {
      if (myRole === 'X') onlineRequestRematch();
    } else {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameActive = true;
      updateStatus();
      render();
      if (mode === 'robot') setTimeout(robotMove, 300);
    }
  }, 1800);
}

/* ============================================================
   ROBOT MODE
============================================================ */
function startRobotMode() {
  mode = 'robot';
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameActive = true;
  scores = { X: 0, O: 0, tie: 0 };
  updateScores();
  document.getElementById('modeBadge').textContent = 'Robot';
  showScreen('gameScreen');
  updateStatus();
  render();
}

function robotMove() {
  if (!gameActive || currentPlayer !== 'O') return;
  let best = -Infinity, move = 0;
  for (let i = 0; i < 9; i++) {
    if (board[i] === null) {
      board[i] = 'O';
      const val = minimax(board, 0, false);
      board[i] = null;
      if (val > best) { best = val; move = i; }
    }
  }
  board[move] = 'O';
  
  if (checkWin('O')) {
    gameActive = false;
    scores.O++;
    updateScores();
    statusLine.textContent = 'Robot wins!';
    render();
    scheduleAutoRestart();
  } else if (board.every(c => c !== null)) {
    gameActive = false;
    scores.tie++;
    updateScores();
    statusLine.textContent = "It's a tie!";
    render();
    scheduleAutoRestart();
  } else {
    currentPlayer = 'X';
    updateStatus();
    render();
  }
}

function minimax(b, depth, isMax) {
  const xWin = checkWin('X'), oWin = checkWin('O');
  if (oWin) return 10 - depth;
  if (xWin) return depth - 10;
  if (b.every(c => c !== null)) return 0;
  
  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i] === null) {
        b[i] = 'O';
        best = Math.max(best, minimax(b, depth + 1, false));
        b[i] = null;
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i] === null) {
        b[i] = 'X';
        best = Math.min(best, minimax(b, depth + 1, true));
        b[i] = null;
      }
    }
    return best;
  }
}

/* ============================================================
   FRIEND MODE (local)
============================================================ */
function startFriendMode(difficulty) {
  mode = 'friend';
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameActive = true;
  scores = { X: 0, O: 0, tie: 0 };
  updateScores();
  document.getElementById('modeBadge').textContent = 'Friend';
  showScreen('gameScreen');
  updateStatus();
  render();
}

/* ============================================================
   ONLINE MODE — Firebase Realtime DB
============================================================ */
const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

function generateRoomCode() {
  let code = '';
  for (let i = 0; i < 4; i++) {
    code += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
  }
  return code;
}

async function createRoom() {
  const msgEl = document.getElementById('onlineSetupMsg');
  msgEl.className = 'hint-msg';
  msgEl.textContent = 'Creating room…';

  roomCode = generateRoomCode();

  const initialState = {
    board: Array(9).fill(null),
    turn: 'X',
    status: 'waiting',
    winner: null,
    moveSeq: 0,
    players: { X: true, O: false }
  };

  try {
    await db.ref('rooms/' + roomCode).set(initialState);
    myRole = 'X';
    document.getElementById('waitingRoomCode').textContent = roomCode;
    showScreen('onlineWaiting');
    listenForOpponent();
  } catch (err) {
    msgEl.textContent = 'Firebase error — check your config and internet.';
    msgEl.className = 'hint-msg error';
  }
}

async function joinRoom() {
  const input = document.getElementById('joinCodeInput');
  const code = input.value.trim().toUpperCase();
  const msgEl = document.getElementById('joinRoomMsg');
  msgEl.className = 'hint-msg';

  if (code.length !== 4) {
    msgEl.textContent = 'Enter a 4-letter code.';
    msgEl.className = 'hint-msg error';
    return;
  }

  msgEl.textContent = 'Joining…';

  try {
    const snapshot = await db.ref('rooms/' + code).once('value');
    if (!snapshot.exists()) {
      msgEl.textContent = 'Room not found.';
      msgEl.className = 'hint-msg error';
      return;
    }

    const state = snapshot.val();
    if (state.players.O) {
      msgEl.textContent = 'Room is full.';
      msgEl.className = 'hint-msg error';
      return;
    }

    state.players.O = true;
    state.status = 'playing';
    await db.ref('rooms/' + code).set(state);

    roomCode = code;
    myRole = 'O';
    board = state.board;
    currentPlayer = state.turn;
    moveSeq = state.moveSeq;
    gameActive = true;

    startOnlineGame();
  } catch (err) {
    msgEl.textContent = 'Firebase error — check your internet.';
    msgEl.className = 'hint-msg error';
  }
}

function listenForOpponent() {
  if (!roomCode) return;

  firebaseGameRef = db.ref('rooms/' + roomCode);
  firebaseListener = firebaseGameRef.on('value', (snapshot) => {
    if (!snapshot.exists()) return;
    const state = snapshot.val();

    if (state.players.O && state.status === 'playing') {
      board = state.board;
      currentPlayer = state.turn;
      moveSeq = state.moveSeq;
      gameActive = true;
      startOnlineGame();
    }
  });
}

function startOnlineGame() {
  mode = 'online';
  scores = { X: 0, O: 0, tie: 0 };
  updateScores();
  document.getElementById('modeBadge').textContent = 'Online';
  showScreen('gameScreen');
  updateStatus();
  render();
  
  firebaseGameRef.off('value', firebaseListener);
  listenToGameUpdates();
}

function listenToGameUpdates() {
  if (!roomCode) return;
  firebaseGameRef = db.ref('rooms/' + roomCode);
  firebaseGameRef.on('value', (snapshot) => {
    if (!snapshot.exists()) return;
    const state = snapshot.val();

    if (state.moveSeq > moveSeq) {
      board = state.board;
      currentPlayer = state.turn;
      moveSeq = state.moveSeq;
      gameActive = state.status === 'playing';

      if (state.status === 'finished') {
        if (state.winner === 'tie') {
          scores.tie++;
        } else if (state.winner === 'X') {
          scores.X++;
        } else if (state.winner === 'O') {
          scores.O++;
        }
        updateScores();
        statusLine.textContent = state.winner === 'tie' ? "It's a tie!" : `${state.winner} wins!`;
        scheduleAutoRestart();
      } else {
        updateStatus();
      }

      render();
    }
  });
}

async function pushGameState() {
  if (!roomCode || !firebaseGameRef) return;

  const win = checkWin('X') || checkWin('O');
  let status = gameActive ? 'playing' : 'finished';
  let winner = null;
  if (!gameActive) {
    if (win) winner = win[0] < 5 ? 'X' : (board[win[0]] === 'X' ? 'X' : 'O');
    if (!win && board.every(c => c !== null)) winner = 'tie';
  }

  const state = {
    board,
    turn: currentPlayer,
    status,
    winner,
    moveSeq: moveSeq + 1,
    players: { X: true, O: true }
  };

  try {
    await firebaseGameRef.set(state);
    moveSeq++;
  } catch (err) {
    footerNote.textContent = 'Sync error — move may not have sent. Will retry.';
  }
}

async function onlineRequestRematch() {
  if (!roomCode || !firebaseGameRef) return;

  const newState = {
    board: Array(9).fill(null),
    turn: 'X',
    status: 'playing',
    winner: null,
    moveSeq: moveSeq + 1,
    players: { X: true, O: true }
  };

  try {
    await firebaseGameRef.set(newState);
    board = newState.board;
    currentPlayer = 'X';
    moveSeq = newState.moveSeq;
    gameActive = true;
    updateStatus();
    render();
  } catch (err) {
    footerNote.textContent = 'Could not start rematch.';
  }
}

/* ============================================================
   INIT
============================================================ */
document.getElementById('joinCodeInput').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase().slice(0, 4);
});

document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinRoom();
});
