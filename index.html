<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Valentine's Challenge Hub</title>
  <style>
    :root {
      --pink: #ff69b4;
      --red: #ff1493;
      --light: #ffe4f0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #ff9ec3, #ff6a9e);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://picsum.photos/id/1015/2000/2000') center/cover;
      opacity: 0.15;
      z-index: -1;
    }
    header {
      text-align: center;
      padding: 20px 15px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255,255,255,0.3);
    }
    h1 {
      font-size: 2.2rem;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-top: 5px;
    }
    .leaderboard {
      background: rgba(255,255,255,0.2);
      margin: 15px;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .leaderboard h2 { margin-bottom: 10px; font-size: 1.3rem; }
    .top3 {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .rank {
      background: rgba(255,255,255,0.3);
      padding: 10px 15px;
      border-radius: 15px;
      min-width: 80px;
    }
    .rank gold { background: linear-gradient(#ffd700, #ffa500); color: #333; }
    .rank silver { background: linear-gradient(#c0c0c0, #a8a8a8); color: #333; }
    .rank bronze { background: linear-gradient(#cd7f32, #b36b2e); color: #fff; }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .game-card {
      background: rgba(255,255,255,0.95);
      color: #333;
      border-radius: 20px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .game-card:hover {
      transform: translateY(-12px) scale(1.05);
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.4);
    }
    .game-card::after {
      content: '❤️';
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 60px;
      opacity: 0.1;
      transition: all 0.4s;
    }
    .game-card:hover::after {
      transform: rotate(20deg) scale(1.3);
      opacity: 0.25;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 10px;
      display: block;
      transition: transform 0.3s;
    }
    .game-card:hover .icon {
      transform: scale(1.2) rotate(8deg);
    }
    .game-title {
      font-weight: 700;
      font-size: 1.05rem;
      margin-top: 8px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }
    .modal-content {
      background: white;
      color: #333;
      width: 100%;
      max-width: 420px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-header {
      background: linear-gradient(135deg, #ff1493, #ff69b4);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }
    .close {
      position: absolute;
      right: 15px;
      top: 15px;
      font-size: 2rem;
      cursor: pointer;
      opacity: 0.8;
    }
    .game-screen {
      padding: 20px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    button {
      background: linear-gradient(#ff1493, #ff69b4);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin: 10px;
      box-shadow: 0 8px 20px rgba(255,20,147,0.4);
    }
    .score {
      font-size: 2rem;
      font-weight: bold;
      color: #ff1493;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>❤️ Valentine's Challenge Hub</h1>
    <p class="subtitle">20 Romantic & Challenging Games for Couples & Lovers</p>
  </header>

  <div class="leaderboard">
    <h2>🏆 Top 3 Lovers This Week</h2>
    <div class="top3" id="top3"></div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>

  <!-- Game Modal -->
  <div class="modal" id="gameModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modalTitle">Game Title</h2>
      </div>
      <div class="game-screen" id="gameScreen">
        <p id="modalDesc">Loading romantic challenge...</p>
        <div id="gameArea" style="width:100%; min-height:300px; display:flex; align-items:center; justify-content:center; font-size:4rem;"></div>
        <div class="score" id="currentScore">Score: 0</div>
        <button onclick="startGame()">Start Challenge</button>
        <button onclick="closeModal()">Back to Hub</button>
      </div>
    </div>
  </div>

  <script>
    // 20 Unique Romantic Games
    const games = [
      {id:1, title:"Heart Beat Rush", icon:"💓", desc:"Tap the screen in rhythm with your lover's heartbeat. The faster it gets, the harder it is!", highScore:0},
      {id:2, title:"Love Letter Frenzy", icon:"💌", desc:"Type sweet love messages as fast as possible before they float away!", highScore:0},
      {id:3, title:"Rose Collector", icon:"🌹", desc:"Catch falling roses while avoiding thorns. Perfect timing challenge!", highScore:0},
      {id:4, title:"Kiss Memory Match", icon:"😘", desc:"Match pairs of romantic kisses and love symbols in this memory game.", highScore:0},
      {id:5, title:"Cupid's Arrow", icon:"🏹", desc:"Aim and shoot Cupid's arrow at moving hearts. Precision matters!", highScore:0},
      {id:6, title:"Flame Keeper", icon:"🔥", desc:"Keep the flame of love burning by tapping at the right moments.", highScore:0},
      {id:7, title:"Eternal Bond", icon:"💍", desc:"Connect glowing rings with lines without crossing. Puzzle challenge!", highScore:0},
      {id:8, title:"Moonlight Whisper", icon:"🌙", desc:"Tap the stars in the correct romantic sequence.", highScore:0},
      {id:9, title:"Love Lock", icon:"🔒", desc:"Unlock hearts by solving quick romantic riddles.", highScore:0},
      {id:10, title:"Butterfly Chase", icon:"🦋", desc:"Catch butterflies carrying love notes in the garden.", highScore:0},
      {id:11, title:"Valentine Flip", icon:"🃏", desc:"Memory flip game with romantic emojis and love quotes.", highScore:0},
      {id:12, title:"Sweet Whisper", icon:"💬", desc:"Repeat the romantic phrases you hear before they fade.", highScore:0},
      {id:13, title:"Hug Rush", icon:"🤗", desc:"Tap as many hugs as possible in 30 seconds!", highScore:0},
      {id:14, title:"Candle Glow", icon:"🕯️", desc:"Keep multiple candles lit by gentle blowing (tapping).", highScore:0},
      {id:15, title:"Poem of Love", icon:"📜", desc:"Complete romantic verses by choosing the right words.", highScore:0},
      {id:16, title:"Forever Us", icon:"👫", desc:"Keep the couple icon together while avoiding obstacles.", highScore:0},
      {id:17, title:"Starlight Dance", icon:"✨", desc:"Dance with the stars by tapping in rhythm.", highScore:0},
      {id:18, title:"Love Clicker", icon:"❤️", desc:"Click hearts to fill the love meter as fast as you can.", highScore:0},
      {id:19, title:"Rose Popper", icon:"🌹", desc:"Pop romantic bubbles containing roses before they burst.", highScore:0},
      {id:20, title:"Eternal Promise", icon:"💞", desc:"Draw hearts continuously without lifting your finger.", highScore:0}
    ];

    let currentGame = null;
    let currentScore = 0;
    let timer = null;

    // Load leaderboard
    function loadLeaderboard() {
      const sorted = [...games].sort((a,b) => b.highScore - a.highScore).slice(0,3);
      const container = document.getElementById('top3');
      container.innerHTML = '';
      
      const medals = ['🥇','🥈','🥉'];
      sorted.forEach((game, i) => {
        const div = document.createElement('div');
        div.className = `rank ${i===0?'gold':i===1?'silver':'bronze'}`;
        div.innerHTML = `
          <div>${medals[i]}</div>
          <div style="font-size:0.9rem; margin-top:5px;">${game.title}</div>
          <div style="font-weight:bold; font-size:1.4rem;">${game.highScore}</div>
        `;
        container.appendChild(div);
      });
    }

    // Render game cards
    function renderGames() {
      const grid = document.getElementById('gamesGrid');
      grid.innerHTML = '';
      
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <span class="icon">${game.icon}</span>
          <div class="game-title">${game.title}</div>
        `;
        card.onclick = () => openGame(game);
        grid.appendChild(card);
      });
    }

    function openGame(game) {
      currentGame = game;
      currentScore = 0;
      document.getElementById('modalTitle').textContent = game.title;
      document.getElementById('modalDesc').textContent = game.desc;
      document.getElementById('currentScore').textContent = 'Score: 0';
      document.getElementById('gameArea').innerHTML = `<div style="font-size:6rem; opacity:0.3;">${game.icon}</div>`;
      document.getElementById('gameModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('gameModal').style.display = 'none';
      if (timer) clearInterval(timer);
      // Save high score
      if (currentGame && currentScore > currentGame.highScore) {
        currentGame.highScore = currentScore;
        localStorage.setItem('valentineGames', JSON.stringify(games));
      }
      loadLeaderboard();
    }

    function startGame() {
      document.getElementById('gameArea').innerHTML = `
        <div style="font-size:5rem; animation: pulse 1s infinite;">${currentGame.icon}</div>
        <p style="margin:20px 0; font-size:1.1rem;">Tap / Click as fast as you can for 15 seconds!</p>
      `;
      
      currentScore = 0;
      document.getElementById('currentScore').textContent = 'Score: 0';
      
      let timeLeft = 15;
      const area = document.getElementById('gameArea');
      
      area.onclick = () => {
        currentScore += 10;
        document.getElementById('currentScore').textContent = `Score: ${currentScore}`;
        
        // Quick animation
        area.style.transform = 'scale(1.15)';
        setTimeout(() => area.style.transform = 'scale(1)', 100);
      };
      
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timer);
          area.innerHTML = `<h2 style="color:#ff1493;">Time's Up! ❤️</h2><p>Your score: <strong>${currentScore}</strong></p>`;
          area.onclick = null;
          
          // Auto save high score
          if (currentScore > currentGame.highScore) {
            currentGame.highScore = currentScore;
            localStorage.setItem('valentineGames', JSON.stringify(games));
            loadLeaderboard();
          }
        }
      }, 1000);
    }

    // Initialize
    window.onload = () => {
      // Load saved scores
      const saved = localStorage.getItem('valentineGames');
      if (saved) {
        const savedGames = JSON.parse(saved);
        games.forEach((game, i) => {
          if (savedGames[i]) game.highScore = savedGames[i].highScore || 0;
        });
      }
      
      renderGames();
      loadLeaderboard();
      
      // Floating hearts animation
      setInterval(() => {
        const heart = document.createElement('div');
        heart.textContent = '❤️';
        heart.style.position = 'fixed';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.top = '100vh';
        heart.style.fontSize = '20px';
        heart.style.opacity = '0.6';
        heart.style.zIndex = '-1';
        heart.style.transition = 'transform 8s linear, opacity 8s';
        document.body.appendChild(heart);
        
        setTimeout(() => {
          heart.style.transform = `translateY(-120vh) rotate(${Math.random()*40-20}deg)`;
          heart.style.opacity = '0';
        }, 100);
        
        setTimeout(() => heart.remove(), 9000);
      }, 300);
    };
  </script>
</body>
</html>
